appId: com.wpinrui.easytrim
productName: Easy Trim
directories:
  buildResources: build
  output: release/${version}
files:
  - 'out/**/*'
  - 'package.json'
asarUnpack:
  - 'node_modules/ffmpeg-static/**'
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
